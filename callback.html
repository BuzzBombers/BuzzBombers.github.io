<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla OAuth Callback</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#111; color:#eee; max-width:700px; margin:60px auto; padding:0 20px; line-height:1.5; }
  h1 { font-size:1.4rem; }
  .box { background:#1c1c1c; border:1px solid #333; border-radius:8px; padding:16px; margin:16px 0; word-break:break-all; }
  .label { color:#9ad; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
  button { background:#3b6; color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-size:0.9rem; }
  button:hover { background:#4c7; }
  code, pre { background:#000; color:#7f7; padding:2px 6px; border-radius:4px; }
  pre { padding:12px; overflow-x:auto; }
  .error { color:#f77; }
  .muted { color:#999; font-size:0.9rem; }
</style>
</head>
<body>
  <h1>Tesla Fleet API &mdash; Authorization Callback</h1>
  <div id="content">Reading URL parameters&hellip;</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDesc = params.get('error_description');
    const el = document.getElementById('content');

    function copy(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = original, 1500);
      });
    }
    window.copy = copy;

    if (error) {
      el.innerHTML = `
        <p class="error"><strong>Authorization failed:</strong> ${error}</p>
        <p class="muted">${errorDesc || ''}</p>`;
    } else if (code) {
      el.innerHTML = `
        <div class="box">
          <div class="label">Authorization Code</div>
          <div id="code-text">${code}</div>
          <button onclick="copy('${code}', this)">Copy code</button>
        </div>
        ${state ? `<div class="box"><div class="label">State</div>${state}</div>` : ''}
        <p class="muted">This code is short-lived (usually a few minutes). Exchange it for tokens now, from your own machine &mdash; not from this page &mdash; since the exchange needs your Client Secret, which should never be placed in public site code.</p>
        <p class="label" style="margin-top:24px;">Token exchange (run locally)</p>
        <pre>curl -X POST https://auth.tesla.com/oauth2/v3/token \\
  -H "Content-Type: application/x-www-form-urlencoded" \\
  -d "grant_type=authorization_code" \\
  -d "client_id=YOUR_CLIENT_ID" \\
  -d "client_secret=YOUR_CLIENT_SECRET" \\
  -d "code=${code}" \\
  -d "redirect_uri=https://buzzbombers.github.io/callback" \\
  -d "audience=https://fleet-api.prd.na.vn.cloud.tesla.com"</pre>
        <p class="muted">Replace YOUR_CLIENT_ID / YOUR_CLIENT_SECRET with the values from your Tesla developer dashboard. Adjust the audience region host if your app/vehicle isn't in North America.</p>`;
    } else {
      el.innerHTML = `<p class="muted">No authorization code found in the URL. This page is meant to be reached via Tesla's OAuth redirect, not visited directly.</p>`;
    }
  </script>
</body>
</html>
